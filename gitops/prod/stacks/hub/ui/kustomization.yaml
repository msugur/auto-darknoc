apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../bases/ui
patches:
  - target:
      kind: Deployment
      name: dark-noc-chatbot
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: quay.io/msugur/auto-darknoc:chatbot-gitsha
  - target:
      kind: Deployment
      name: dark-noc-dashboard
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: quay.io/msugur/auto-darknoc:dashboard-gitsha
