apiVersion: v1
kind: Namespace
metadata:
  name: dark-noc-grafana
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: dark-noc-grafana
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dark-noc-grafana-monitoring-view
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: dark-noc-grafana
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: dark-noc-grafana
type: Opaque
stringData:
  admin-user: admin
  admin-password: redhat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: dark-noc-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: grafana
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_USERS_DEFAULT_THEME
              value: "light"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/01-exec-overview.json
            - name: GF_SECURITY_COOKIE_SAMESITE
              value: lax
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: dashboards
          configMap:
            name: dark-noc-grafana-dashboards
        - name: provisioning
          configMap:
            name: dark-noc-grafana-provisioning
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: datasources
          configMap:
            name: dark-noc-grafana-provisioning
            items:
              - key: datasources.yaml
                path: datasources.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: dark-noc-grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: dark-noc-grafana
spec:
  to:
    kind: Service
    name: grafana
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
