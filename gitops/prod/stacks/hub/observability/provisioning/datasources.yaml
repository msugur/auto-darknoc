apiVersion: 1

prune: true

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: https://thanos-querier.openshift-monitoring.svc:9091
    isDefault: true
    editable: false
    jsonData:
      tlsSkipVerify: true
      httpHeaderName1: Authorization
      timeInterval: 15s
      queryTimeout: 60s
    secureJsonData:
      httpHeaderValue1: "Bearer $__file{/var/run/secrets/kubernetes.io/serviceaccount/token}"
