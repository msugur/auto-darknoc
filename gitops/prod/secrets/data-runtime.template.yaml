apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: dark-noc-minio
type: Opaque
stringData:
  MINIO_ROOT_USER: "REPLACE_WITH_MINIO_ROOT_USER"
  MINIO_ROOT_PASSWORD: "REPLACE_WITH_MINIO_ROOT_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-loki-secret
  namespace: openshift-logging
type: Opaque
stringData:
  access_key_id: "REPLACE_WITH_MINIO_ACCESS_KEY"
  access_key_secret: "REPLACE_WITH_MINIO_SECRET_KEY"
  bucketnames: "loki-chunks"
  endpoint: "http://minio.dark-noc-minio.svc:9000"
  region: "us-east-1"
---
apiVersion: v1
kind: Secret
metadata:
  name: pgvector-superuser
  namespace: dark-noc-rag
type: Opaque
stringData:
  username: "noc_agent"
  password: "REPLACE_WITH_PGVECTOR_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-postgres-superuser
  namespace: dark-noc-observability
type: Opaque
stringData:
  username: "langfuse"
  password: "REPLACE_WITH_LANGFUSE_DB_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: dark-noc-observability
type: Opaque
stringData:
  SALT: "REPLACE_WITH_LANGFUSE_SALT"
  ENCRYPTION_KEY: "REPLACE_WITH_LANGFUSE_ENCRYPTION_KEY"
  NEXTAUTH_SECRET: "REPLACE_WITH_LANGFUSE_NEXTAUTH_SECRET"
  DATABASE_PASSWORD: "REPLACE_WITH_LANGFUSE_DB_PASSWORD"
  REDIS_PASSWORD: ""
  CLICKHOUSE_PASSWORD: "REPLACE_WITH_CLICKHOUSE_PASSWORD"
  S3_ACCESS_KEY_ID: "REPLACE_WITH_MINIO_ACCESS_KEY"
  S3_SECRET_ACCESS_KEY: "REPLACE_WITH_MINIO_SECRET_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: dark-noc-hub
type: Opaque
stringData:
  PGVECTOR_URL: "REPLACE_WITH_PGVECTOR_URL"
  PG_CHECKPOINT_URL: "REPLACE_WITH_PG_CHECKPOINT_URL"
  LANGFUSE_PUBLIC_KEY: "REPLACE_WITH_LANGFUSE_PUBLIC_KEY"
  LANGFUSE_SECRET_KEY: "REPLACE_WITH_LANGFUSE_SECRET_KEY"
  LANGFUSE_HOST: "http://langfuse.dark-noc-observability.svc:3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-runtime-secrets
  namespace: dark-noc-hub
type: Opaque
stringData:
  LLAMASTACK_POSTGRES_PASSWORD: "REPLACE_WITH_LANGFUSE_DB_PASSWORD"
  VLLM_API_TOKEN: ""
  VLLM_EMBEDDING_API_TOKEN: ""
