apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foundation-hub
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: auto-darknoc-prod
  source:
    repoURL: https://github.com/msugur/auto-darknoc.git
    targetRevision: main
    path: gitops/prod/stacks/hub/foundation
  destination:
    name: in-cluster
    namespace: dark-noc-hub
  ignoreDifferences:
    - group: maistra.io
      kind: ServiceMeshControlPlane
      name: basic
      namespace: istio-system
      jsonPointers:
        - /spec
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
