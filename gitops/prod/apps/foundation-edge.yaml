apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foundation-edge
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: auto-darknoc-prod
  source:
    repoURL: https://github.com/msugur/auto-darknoc.git
    targetRevision: main
    path: gitops/prod/stacks/edge/foundation
  destination:
    name: edge-cluster
    namespace: dark-noc-edge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
