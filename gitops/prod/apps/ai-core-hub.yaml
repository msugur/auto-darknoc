apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-core-hub
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: auto-darknoc-prod
  source:
    repoURL: https://github.com/msugur/auto-darknoc.git
    targetRevision: main
    path: gitops/prod/stacks/hub/ai-core
  destination:
    name: in-cluster
    namespace: dark-noc-hub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
