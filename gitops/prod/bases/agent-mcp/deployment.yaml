# =============================================================
# LangGraph Dark NOC Agent — Deployment
# =============================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dark-noc-agent
  namespace: dark-noc-hub
  labels:
    app.kubernetes.io/part-of: dark-noc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dark-noc-agent
  namespace: dark-noc-hub
  labels:
    app: dark-noc-agent
    app.kubernetes.io/part-of: dark-noc
    dark-noc/layer: ai
spec:
  replicas: 1    # Single agent instance (durable state via PostgresSaver)
  selector:
    matchLabels:
      app: dark-noc-agent
  template:
    metadata:
      labels:
        app: dark-noc-agent
    spec:
      serviceAccountName: dark-noc-agent
      containers:
        - name: agent
          image: image-registry.openshift-image-registry.svc:5000/dark-noc-hub/dark-noc-agent:latest
          imagePullPolicy: Always
          env:
            - name: VLLM_URL
              valueFrom:
                configMapKeyRef:
                  name: dark-noc-model-binding
                  key: VLLM_URL
                  optional: true
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: dark-noc-model-binding
                  key: MODEL_ID
                  optional: true
            - name: KAFKA_BOOTSTRAP
              value: "dark-noc-kafka-kafka-bootstrap.dark-noc-kafka.svc:9092"
            - name: PGVECTOR_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: PGVECTOR_URL
            - name: PG_CHECKPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: PG_CHECKPOINT_URL
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: LANGFUSE_SECRET_KEY
            - name: LANGFUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: LANGFUSE_HOST
            - name: XDG_CACHE_HOME
              value: "/tmp/.cache"
            - name: HF_HOME
              value: "/tmp/huggingface"
            - name: TRANSFORMERS_CACHE
              value: "/tmp/huggingface/transformers"
            - name: SENTENCE_TRANSFORMERS_HOME
              value: "/tmp/huggingface/sentence-transformers"
            - name: MCP_OPENSHIFT_URL
              value: "http://mcp-openshift.dark-noc-mcp.svc:8001/mcp"
            - name: MCP_LOKI_URL
              value: "http://mcp-lokistack.dark-noc-mcp.svc:8002/mcp"
            - name: MCP_AAP_URL
              value: "http://mcp-aap.dark-noc-mcp.svc:8004/mcp"
            - name: MCP_SLACK_URL
              value: "http://mcp-slack.dark-noc-mcp.svc:8005/mcp"
            - name: MCP_SNOW_URL
              value: "http://mcp-servicenow.dark-noc-mcp.svc:8006/mcp"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 60
