# =============================================================
# MCP Servers — All 6 Deployments + Services
# =============================================================
# PURPOSE:
#   Deploys all 6 FastMCP servers in the dark-noc-mcp namespace.
#   Each server is a small Python pod (~64Mi RAM) exposing
#   Streamable HTTP transport for the LangGraph agent.
#
# BUILD (before applying this deployment):
#   For each server, build and push to internal registry:
#   oc new-build --binary --name=mcp-openshift -n dark-noc-mcp
#   oc start-build mcp-openshift --from-dir=mcp-servers/mcp-openshift --follow
#   (repeat for mcp-lokistack, mcp-kafka, mcp-aap, mcp-slack, mcp-servicenow)
#
# APPLY WITH:
#   oc apply -f mcp-servers-deployment.yaml -n dark-noc-mcp
# =============================================================

# ─── MCP OpenShift Server ────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-openshift
  namespace: dark-noc-mcp
  labels:
    app: mcp-openshift
    app.kubernetes.io/part-of: dark-noc
    dark-noc/layer: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-openshift
  template:
    metadata:
      labels:
        app: mcp-openshift
    spec:
      serviceAccountName: mcp-openshift-sa
      containers:
        - name: server
          image: image-registry.openshift-image-registry.svc:5000/dark-noc-mcp/mcp-openshift:latest
          ports:
            - containerPort: 8001
          env:
            - name: EDGE_KUBECONFIG
              value: /kubeconfig/config
            - name: PORT
              value: "8001"
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: kubeconfig
          secret:
            secretName: edge-01-kubeconfig
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-openshift-sa
  namespace: dark-noc-mcp
  labels:
    app.kubernetes.io/part-of: dark-noc
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-openshift
  namespace: dark-noc-mcp
  labels:
    app: mcp-openshift
spec:
  selector:
    app: mcp-openshift
  ports:
    - port: 8001
      targetPort: 8001

