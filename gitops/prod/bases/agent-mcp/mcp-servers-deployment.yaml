# ─── MCP AAP Server ──────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-aap
  namespace: dark-noc-mcp
  labels:
    app: mcp-aap
    app.kubernetes.io/part-of: dark-noc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-aap
  template:
    metadata:
      labels:
        app: mcp-aap
    spec:
      containers:
        - name: server
          image: image-registry.openshift-image-registry.svc:5000/dark-noc-mcp/mcp-aap:latest
          ports:
            - containerPort: 8004
          env:
            - name: PORT
              value: "8004"
            - name: AAP_URL
              value: "http://aap-enterprise-controller-service.aap.svc"
            - name: AAP_API_PREFIX
              value: "/api/controller/v2"
            - name: AAP_VERIFY_SSL
              value: "false"
            - name: AAP_USERNAME
              value: "admin"
            - name: AAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aap-admin-secret
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-aap
  namespace: dark-noc-mcp
spec:
  selector:
    app: mcp-aap
  ports:
    - port: 8004
      targetPort: 8004

