# ─── MCP ServiceNow Server ───────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-servicenow
  namespace: dark-noc-mcp
  labels:
    app: mcp-servicenow
    app.kubernetes.io/part-of: dark-noc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-servicenow
  template:
    metadata:
      labels:
        app: mcp-servicenow
    spec:
      containers:
        - name: server
          image: image-registry.openshift-image-registry.svc:5000/dark-noc-mcp/mcp-servicenow:latest
          ports:
            - containerPort: 8006
          env:
            - name: PORT
              value: "8006"
            - name: SERVICENOW_URL
              valueFrom:
                secretKeyRef:
                  name: servicenow-secrets
                  key: SERVICENOW_URL
            - name: SERVICENOW_MODE
              valueFrom:
                secretKeyRef:
                  name: servicenow-secrets
                  key: SERVICENOW_MODE
            - name: SERVICENOW_USERNAME
              valueFrom:
                secretKeyRef:
                  name: servicenow-secrets
                  key: SERVICENOW_USERNAME
            - name: SERVICENOW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: servicenow-secrets
                  key: SERVICENOW_PASSWORD
            - name: SERVICENOW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: servicenow-secrets
                  key: SERVICENOW_API_KEY
            - name: SERVICENOW_CALLER_NAME
              valueFrom:
                secretKeyRef:
                  name: servicenow-secrets
                  key: SERVICENOW_CALLER_NAME
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-secrets
                  key: SLACK_BOT_TOKEN
            - name: SLACK_NOC_CHANNEL
              value: "#demos"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-servicenow
  namespace: dark-noc-mcp
spec:
  selector:
    app: mcp-servicenow
  ports:
    - port: 8006
      targetPort: 8006
---
# ServiceNow secrets template (real instance)
apiVersion: v1
kind: Secret
metadata:
  name: servicenow-secrets
  namespace: dark-noc-mcp
  labels:
    app.kubernetes.io/part-of: dark-noc
type: Opaque
stringData:
  SERVICENOW_URL: "https://dev365997.service-now.com"
  SERVICENOW_MODE: "real"
  SERVICENOW_USERNAME: "admin"
  SERVICENOW_PASSWORD: "D$*REPLACE_WITH_SERVICENOW_PASSWORD"
  SERVICENOW_API_KEY: ""
  SERVICENOW_CALLER_NAME: "Mithun Sugur"
---
# Slack secrets template (fill in before applying)
apiVersion: v1
kind: Secret
metadata:
  name: slack-secrets
  namespace: dark-noc-mcp
  labels:
    app.kubernetes.io/part-of: dark-noc
type: Opaque
stringData:
  SLACK_BOT_TOKEN: "REPLACE_WITH_XOXB_TOKEN"
