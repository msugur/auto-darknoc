---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dark-noc-dashboard
  namespace: dark-noc-ui
  labels:
    app: dark-noc-dashboard
    app.kubernetes.io/part-of: dark-noc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dark-noc-dashboard
  template:
    metadata:
      labels:
        app: dark-noc-dashboard
    spec:
      containers:
        - name: dashboard
          image: image-registry.openshift-image-registry.svc:5000/dark-noc-ui/dark-noc-dashboard:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dark-noc-dashboard
  namespace: dark-noc-ui
  labels:
    app: dark-noc-dashboard
spec:
  selector:
    app: dark-noc-dashboard
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dark-noc-dashboard
  namespace: dark-noc-ui
  labels:
    app: dark-noc-dashboard
spec:
  to:
    kind: Service
    name: dark-noc-dashboard
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dark-noc-chatbot
  namespace: dark-noc-ui
  labels:
    app: dark-noc-chatbot
    app.kubernetes.io/part-of: dark-noc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dark-noc-chatbot
  template:
    metadata:
      labels:
        app: dark-noc-chatbot
    spec:
      containers:
        - name: chatbot
          image: image-registry.openshift-image-registry.svc:5000/dark-noc-ui/dark-noc-chatbot:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: ui-access-secrets
          env:
            - name: AI_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: dark-noc-model-binding
                  key: MODEL_ID
                  optional: true
            - name: AGENT_FRAMEWORK
              value: "LangGraph + MCP + LlamaStack"
            - name: MODEL_API_URL
              valueFrom:
                configMapKeyRef:
                  name: dark-noc-model-binding
                  key: MODEL_API_URL
                  optional: true
            - name: MODEL_TIMEOUT_SECONDS
              value: "25"
            - name: MODEL_MAX_TOKENS
              value: "280"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dark-noc-chatbot
  namespace: dark-noc-ui
  labels:
    app: dark-noc-chatbot
spec:
  selector:
    app: dark-noc-chatbot
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dark-noc-chatbot
  namespace: dark-noc-ui
  labels:
    app: dark-noc-chatbot
spec:
  to:
    kind: Service
    name: dark-noc-chatbot
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
