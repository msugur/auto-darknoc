apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-controller-to-langfuse-postgres-status
  namespace: dark-noc-observability
  labels:
    app.kubernetes.io/part-of: dark-noc
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: langfuse-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000
