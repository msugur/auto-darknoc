apiVersion: v1
kind: ServiceAccount
metadata:
  name: edge-eda-oom-watcher
  namespace: dark-noc-edge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: edge-eda-oom-watcher
  namespace: dark-noc-edge
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edge-eda-oom-watcher
  namespace: dark-noc-edge
subjects:
  - kind: ServiceAccount
    name: edge-eda-oom-watcher
    namespace: dark-noc-edge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: edge-eda-oom-watcher
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-eda-oom-watcher-script
  namespace: dark-noc-edge
data:
  watcher.py: |
    #!/usr/bin/env python3
    import json
    import os
    import subprocess
    import time
    import urllib.request

    NS = os.getenv("EDGE_NAMESPACE", "dark-noc-edge")
    LABEL = os.getenv("EDGE_LABEL", "app=nginx")
    RUNNER_URL = os.getenv("EDGE_EDA_RUNNER_URL", "http://edge-eda-runner.dark-noc-edge.svc:5000/endpoint")
    DEPLOYMENT = os.getenv("EDGE_DEPLOYMENT", "nginx")

    seen = set()

    def get_pods():
      cmd = ["oc", "-n", NS, "get", "pods", "-l", LABEL, "-o", "json"]
      out = subprocess.check_output(cmd, text=True)
      return json.loads(out).get("items", [])

    def post_event(payload):
      req = urllib.request.Request(
        RUNNER_URL,
        data=json.dumps(payload).encode("utf-8"),
        headers={"Content-Type": "application/json"},
        method="POST",
      )
      with urllib.request.urlopen(req, timeout=10) as resp:
        body = resp.read().decode("utf-8")
        print(f"edge-eda-oom-watcher: posted {payload} status={resp.status} body={body}", flush=True)

    def deployment_memory_limit_mi():
      cmd = ["oc", "-n", NS, "get", "deployment", DEPLOYMENT, "-o", "json"]
      out = subprocess.check_output(cmd, text=True)
      dep = json.loads(out)
      mem = (
        dep.get("spec", {})
        .get("template", {})
        .get("spec", {})
        .get("containers", [{}])[0]
        .get("resources", {})
        .get("limits", {})
        .get("memory", "")
      )
      if mem.endswith("Mi"):
        return int(mem[:-2])
      if mem.endswith("Gi"):
        return int(mem[:-2]) * 1024
      return None

    def pod_oom_event_key(pod):
      name = pod.get("metadata", {}).get("name", "")
      statuses = pod.get("status", {}).get("containerStatuses", [])
      for st in statuses:
        term = st.get("lastState", {}).get("terminated") or st.get("state", {}).get("terminated")
        if term and term.get("reason") == "OOMKilled":
          return f"{name}:{st.get('name','container')}:{term.get('finishedAt','unknown')}"
      return None

    while True:
      try:
        limit_mi = deployment_memory_limit_mi()
        threshold_key = f"unsafe-limit:{limit_mi}"
        if limit_mi is not None and limit_mi <= 32 and threshold_key not in seen:
          seen.add(threshold_key)
          post_event({
            "failure_type": "OOMKilled",
            "namespace": NS,
            "deployment": DEPLOYMENT,
            "reason": f"unsafe-memory-limit-{limit_mi}Mi",
          })

        for pod in get_pods():
          key = pod_oom_event_key(pod)
          if key and key not in seen:
            seen.add(key)
            post_event({"failure_type": "OOMKilled", "namespace": NS, "pod": pod.get("metadata", {}).get("name", "")})
      except Exception as e:
        print(f"edge-eda-oom-watcher: error={e}", flush=True)
      time.sleep(10)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-eda-oom-watcher
  namespace: dark-noc-edge
  labels:
    app: edge-eda-oom-watcher
    app.kubernetes.io/part-of: dark-noc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-eda-oom-watcher
  template:
    metadata:
      labels:
        app: edge-eda-oom-watcher
    spec:
      serviceAccountName: edge-eda-oom-watcher
      containers:
        - name: watcher
          image: quay.io/openshift/origin-cli:4.21
          imagePullPolicy: IfNotPresent
          command: ["python3", "/watcher/watcher.py"]
          env:
            - name: EDGE_NAMESPACE
              value: dark-noc-edge
            - name: EDGE_LABEL
              value: app=nginx
            - name: EDGE_DEPLOYMENT
              value: nginx
            - name: EDGE_EDA_RUNNER_URL
              value: http://edge-eda-runner.dark-noc-edge.svc:5000/endpoint
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: watcher-script
              mountPath: /watcher
      volumes:
        - name: watcher-script
          configMap:
            name: edge-eda-oom-watcher-script
            defaultMode: 0555
