# =============================================================
# Dark NOC — Hub Cluster Namespaces
# =============================================================
# PURPOSE:
#   Creates all 14 namespaces on the hub cluster.
#   Each namespace is isolated and purpose-specific.
#
# WHY NAMESPACE ISOLATION:
#   - RBAC scope: each component only has permissions in its NS
#   - NetworkPolicy scope: explicit cross-NS traffic control
#   - Resource quota: prevent one component starving others
#   - Operational clarity: easy to identify component ownership
#
# APPLY WITH:
#   oc apply -f hub-namespaces.yaml
# =============================================================
---
# AI Platform — Hub Intelligence Layer
apiVersion: v1
kind: Namespace
metadata:
  name: dark-noc-hub
  labels:
    app.kubernetes.io/part-of: dark-noc
    dark-noc/layer: ai-hub
    dark-noc/cluster: hub
  annotations:
    openshift.io/description: "Dark NOC: LangGraph agent, LlamaStack server, hub vLLM inference"
    openshift.io/display-name: "Dark NOC — Hub AI"
---
