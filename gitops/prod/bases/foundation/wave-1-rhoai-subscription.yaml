# =============================================================
# Red Hat OpenShift AI 3.3 — Operator Subscription
# =============================================================
# PURPOSE:
#   Installs the RHOAI operator which manages the entire
#   AI/ML platform: model serving, LlamaStack, workbenches,
#   pipelines, and the model registry.
#
# WHY RHOAI 3.3:
#   - LlamaStack Operator built-in (deploys Llama Stack via single CR)
#   - KServe RawDeployment (Serverless deprecated in 3.3)
#   - Hardware Profiles replace Accelerator Profiles
#   - KEDA autoscaling for inference services (Tech Preview)
#   - Air-gapped/disconnected deployment support
#   - EAGLE speculative decoding (2x inference throughput)
#
# NOTE: RHOAI 3.x is NOT an upgrade from 2.x — fresh install only.
#       If rhods-operator 2.x is already installed, uninstall first.
#
# APPLY WITH:
#   oc apply -f wave-1-rhoai-subscription.yaml
#
# VERIFY:
#   oc get csv -n redhat-ods-operator | grep rhods-operator
#   # Wait for: rhods-operator.v3.3.x    Succeeded
#
# WHAT HAPPENS AFTER:
#   - RHOAI operator pod starts in redhat-ods-operator namespace
#   - redhat-ods-applications namespace gets created automatically
#   - DataScienceCluster CR must be created next (phase-03)
# =============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: redhat-ods-operator
  labels:
    app.kubernetes.io/part-of: dark-noc
    dark-noc/layer: ai-platform
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhods-operator
  namespace: redhat-ods-operator
  labels:
    app.kubernetes.io/part-of: dark-noc
spec:
  channel: stable-3.3       # pin OpenShift AI 3.3 stream
  installPlanApproval: Automatic
  name: rhods-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  # config:
  #   env:
  #   - name: "DISABLE_DSC_CONFIG"
  #     value: "false"
