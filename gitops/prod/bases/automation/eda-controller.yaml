# =============================================================
# EDA — Event-Driven Ansible 2.5
# =============================================================
# PURPOSE:
#   EDA Controller watches Kafka topics and auto-triggers Ansible
#   job templates when log patterns match rulebook conditions.
#   This is the "fast path" — for simple, known failures,
#   EDA acts BEFORE the AI agent analyzes the logs.
#
# AAP 2.5 EDA ARCHITECTURE:
#   Kafka (nginx-logs topic) → EDA Kafka source plugin
#   → Rulebook match (pattern: "worker process exited" + exit code 9)
#   → Automation Controller job launch (restart-nginx template)
#   → Playbook runs on edge
#
# FAST PATH vs AI PATH:
#   Simple cases (OOMKilled → restart): EDA handles in ~15 seconds
#   Complex cases (unknown error, needs root cause): LangGraph agent
#   EDA and AI operate in parallel — EDA doesn't block AI analysis
#
# AAP 2.5 FEATURE: Event Streams Fan-out
#   One Kafka event can trigger MULTIPLE rulebooks simultaneously.
#   Example: nginx OOMKilled triggers both:
#   1. EDA: restart nginx immediately
#   2. LangGraph agent: analyze root cause for permanent fix
#
# APPLY WITH:
#   oc apply -f eda-controller.yaml -n aap
#
# VERIFY:
#   oc get eda -n aap
#   oc get route eda -n aap
# =============================================================
---
apiVersion: eda.ansible.com/v1alpha1
kind: EDA
metadata:
  name: eda
  namespace: aap
  labels:
    app.kubernetes.io/part-of: dark-noc
spec:
  # Admin credentials (same admin as AutomationController)
  automation_server_url: "https://aap.aap.svc"
  automation_server_ssl_verify: "no"    # Self-signed cert in demo
  admin_user: "admin"
  admin_password_secret: "aap-admin-secret"
