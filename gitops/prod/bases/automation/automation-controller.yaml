# =============================================================
# AutomationController — AAP 2.5 on OpenShift
# =============================================================
# PURPOSE:
#   Deploys the Ansible Automation Platform Controller (formerly
#   Red Hat Ansible Tower). This is the job execution engine
#   that the LangGraph MCP server calls via REST API to trigger
#   remediation playbooks on the edge cluster.
#
# AAP 2.5 ARCHITECTURE:
#   - No separate database setup — operator manages PostgreSQL
#   - Unified Platform Gateway: single ingress for all AAP services
#   - REST API at: https://aap-automation-hub.apps.<cluster>/api/v2/
#   - Job Templates: pre-configured automation units
#   - Dynamic Inventory: edge cluster nodes from kubeconfig
#
# WHAT THE AGENT DOES VIA AAP API:
#   1. POST /api/v2/job_templates/<id>/launch/  (trigger job)
#   2. GET  /api/v2/jobs/<id>/                  (poll status)
#   3. GET  /api/v2/jobs/<id>/stdout/           (get output)
#
# CREDENTIAL TYPES USED:
#   - OpenShift/Kubernetes credential (edge cluster kubeconfig)
#   - Machine credential (if SSH-based inventory used)
#
# SIZING (demo):
#   1 replica, 2 vCPU, 4Gi RAM — sufficient for demo job throughput
#
# APPLY WITH:
#   oc apply -f automation-controller.yaml -n aap
#
# VERIFY:
#   oc get automationcontroller -n aap
#   oc get route aap -n aap
# =============================================================
---
apiVersion: automationcontroller.ansible.com/v1beta1
kind: AutomationController
metadata:
  name: aap
  namespace: aap
  labels:
    app.kubernetes.io/part-of: dark-noc
spec:
  # Admin credentials (change password after install)
  admin_user: admin
  admin_password_secret: aap-admin-secret

  # Operator-managed PostgreSQL (no external DB needed)
  postgres_configuration_secret: ""    # Leave empty for auto-provisioning

  # Resource sizing for demo
  replicas: 1
  resource_requirements:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  # OpenShift Route
  route_tls_termination_mechanism: Edge
  hostname: ""    # Auto-generated from cluster domain

  # Container logging
  log_level: WARNING

  # Execution Environments
  ee_images:
    - name: "Dark NOC EE"
      image: quay.io/ansible/awx-ee:latest    # Replace with custom EE if needed
