apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - aap-platform.yaml
  - aap-edge-access.template.yaml
  - aap-bootstrap-job.yaml
  - managed-cluster.yaml
  - multiclusterhub.yaml
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: aap-admin-secret
    namespace: aap
    literals:
      - password=redhat
