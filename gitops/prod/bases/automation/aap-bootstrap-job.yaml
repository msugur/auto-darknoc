apiVersion: batch/v1
kind: Job
metadata:
  name: aap-bootstrap-content
  namespace: aap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: python:3.11-alpine
          env:
            - name: CONTROLLER_URL
              value: "http://aap-enterprise-controller-service.aap.svc"
            - name: AAP_USERNAME
              value: "admin"
            - name: AAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aap-enterprise-controller-admin-password
                  key: password
            - name: DEMO_SCM_URL
              value: "https://github.com/msugur/auto-darknoc"
            - name: DEMO_SCM_BRANCH
              value: "main"
            - name: EDGE_API_URL
              valueFrom:
                secretKeyRef:
                  name: aap-edge-credentials
                  key: EDGE_API_URL
                  optional: true
            - name: EDGE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aap-edge-credentials
                  key: EDGE_API_TOKEN
                  optional: true
          command:
            - python
            - -c
            - |
              import base64
              import json
              import os
              import ssl
              import urllib.parse
              import urllib.request

              base = os.environ['CONTROLLER_URL'].rstrip('/')
              api = f"{base}/api/controller/v2"
              user = os.environ['AAP_USERNAME']
              pw = os.environ['AAP_PASSWORD']
              scm_url = os.environ['DEMO_SCM_URL']
              scm_branch = os.environ['DEMO_SCM_BRANCH']
              edge_api_url = os.environ.get("EDGE_API_URL", "").strip()
              edge_api_token = os.environ.get("EDGE_API_TOKEN", "").strip()

              token = base64.b64encode(f"{user}:{pw}".encode()).decode()
              headers = {
                  "Authorization": f"Basic {token}",
                  "Content-Type": "application/json",
              }
              ctx = ssl._create_unverified_context()

              def req(method, url, payload=None):
                  data = None
                  if payload is not None:
                      data = json.dumps(payload).encode()
                  r = urllib.request.Request(url, data=data, headers=headers, method=method)
                  with urllib.request.urlopen(r, context=ctx, timeout=45) as resp:
                      return json.loads(resp.read().decode() or "{}")

              def get(endpoint, qs=None):
                  url = f"{api}/{endpoint}/"
                  if qs:
                      url += "?" + urllib.parse.urlencode(qs)
                  return req("GET", url)

              def post(endpoint, payload):
                  return req("POST", f"{api}/{endpoint}/", payload)

              def patch(endpoint, obj_id, payload):
                  return req("PATCH", f"{api}/{endpoint}/{obj_id}/", payload)

              def by_name(endpoint, name):
                  results = get(endpoint, {"name": name}).get("results", [])
                  return results[0] if results else None

              def ensure_project(name):
                  p = by_name("projects", name)
                  desired = {
                      "name": name,
                      "organization": 1,
                      "scm_type": "git",
                      "scm_url": scm_url,
                      "scm_branch": scm_branch,
                      "scm_update_on_launch": True,
                  }
                  if not p:
                      p = post("projects", desired)
                      print(f"created project {name}: {p.get('id')}")
                  else:
                      patch("projects", int(p["id"]), desired)
                      print(f"existing project {name}: {p.get('id')}")

                  try:
                      req("POST", f"{api}/projects/{p['id']}/update/", {})
                  except Exception as e:
                      print(f"project update trigger warning: {e}")
                  return int(p["id"])

              def ensure_inventory(name):
                  inv = by_name("inventories", name)
                  if not inv:
                      inv = post("inventories", {"name": name, "organization": 1})
                      print(f"created inventory {name}: {inv.get('id')}")
                  else:
                      print(f"existing inventory {name}: {inv.get('id')}")

                  hosts = get("hosts", {"name": "localhost", "inventory": int(inv["id"])}).get("results", [])
                  if not hosts:
                      post("hosts", {
                          "name": "localhost",
                          "inventory": int(inv["id"]),
                          "variables": "ansible_connection: local",
                      })
                      print("added localhost host")
                  return int(inv["id"])

              def ensure_template(name, project_id, inventory_id, playbook, fallback_playbook=None):
                  jt = by_name("job_templates", name)
                  payload = {
                      "name": name,
                      "job_type": "run",
                      "project": project_id,
                      "inventory": inventory_id,
                      "playbook": playbook,
                      "ask_variables_on_launch": True,
                  }
                  try:
                      if not jt:
                          jt = post("job_templates", payload)
                          print(f"created template {name}: {jt.get('id')}")
                      else:
                          patch("job_templates", int(jt["id"]), payload)
                          print(f"updated template {name}: {jt.get('id')}")
                  except Exception as e:
                      if not fallback_playbook:
                          raise
                      print(f"template bootstrap warning for {name} ({playbook}): {e}; retrying with {fallback_playbook}")
                      payload["playbook"] = fallback_playbook
                      if not jt:
                          jt = post("job_templates", payload)
                          print(f"created template {name} with fallback playbook: {jt.get('id')}")
                      else:
                          patch("job_templates", int(jt["id"]), payload)
                          print(f"updated template {name} with fallback playbook: {jt.get('id')}")
                  return int(jt["id"])

              def ensure_edge_credential():
                  if not edge_api_url or not edge_api_token or edge_api_token.startswith("REPLACE_"):
                      print("edge credential secret is placeholder; skipping edge credential bootstrap")
                      return None

                  ctypes = get("credential_types", {"managed": "true"}).get("results", [])
                  k8s_type = next((c for c in ctypes if c.get("name") == "OpenShift or Kubernetes API Bearer Token"), None)
                  if not k8s_type:
                      print("OpenShift/Kubernetes bearer credential type not found; skipping")
                      return None

                  name = "edge-01-k8s"
                  cred = by_name("credentials", name)
                  payload = {
                      "name": name,
                      "organization": 1,
                      "credential_type": int(k8s_type["id"]),
                      "inputs": {
                          "host": edge_api_url,
                          "verify_ssl": False,
                          "bearer_token": edge_api_token,
                      },
                  }
                  if not cred:
                      cred = post("credentials", payload)
                      print(f"created credential {name}: {cred.get('id')}")
                  else:
                      patch("credentials", int(cred["id"]), payload)
                      print(f"updated credential {name}: {cred.get('id')}")
                  return int(cred["id"])

              def associate_credential(job_template_id, credential_id):
                  if not credential_id:
                      return
                  try:
                      req("POST", f"{api}/job_templates/{job_template_id}/credentials/", {"id": int(credential_id)})
                      print(f"associated credential {credential_id} -> template {job_template_id}")
                  except Exception as e:
                      print(f"credential association warning for template {job_template_id}: {e}")

              project_id = ensure_project("Demo Project")
              inventory_id = ensure_inventory("Demo Inventory")
              edge_cred_id = ensure_edge_credential()
              hello_id = ensure_template("Demo Job Template", project_id, inventory_id, "hello_world.yml")
              restart_id = ensure_template("restart-nginx", project_id, inventory_id, "playbooks/restart-nginx.yaml", None)
              # Keep lightspeed template executable by default using a real remediation playbook.
              lightspeed_id = ensure_template(
                  "lightspeed-generate-and-run",
                  project_id,
                  inventory_id,
                  "playbooks/restart-nginx.yaml",
                  "hello_world.yml",
              )
              associate_credential(restart_id, edge_cred_id)
              associate_credential(lightspeed_id, edge_cred_id)

              jobs = get("jobs", {"job_template": hello_id}).get("count", 0)
              if int(jobs) == 0:
                  try:
                      j = req("POST", f"{api}/job_templates/{hello_id}/launch/", {})
                      print(f"launched demo job {j.get('id')}")
                  except Exception as e:
                      print(f"demo job launch warning: {e}")
              else:
                  print(f"demo job already exists: {jobs}")

              print("bootstrap complete")
