# =============================================================
# LlamaStack Distribution — RHOAI 3.3 Agent Framework
# =============================================================
# NOTE:
#   The LLSD CRD schema used by current OCP AI requires:
#     - spec.server.distribution
#   This file is aligned to llamastack.io/v1alpha1.
# =============================================================
apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: dark-noc-llamastack
  namespace: dark-noc-hub
  labels:
    app.kubernetes.io/part-of: dark-noc
    dark-noc/layer: ai
spec:
  replicas: 1
  network:
    exposeRoute: true
  server:
    workers: 1
    distribution:
      name: "rh-dev"
    containerSpec:
      name: llamastack
      port: 8321
      env:
        - name: POSTGRES_HOST
          value: "langfuse-postgres-rw.dark-noc-observability.svc.cluster.local"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "llamastack"
        - name: POSTGRES_USER
          value: "langfuse"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ai-runtime-secrets
              key: LLAMASTACK_POSTGRES_PASSWORD
        - name: VLLM_URL
          value: "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1"
        - name: VLLM_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: ai-runtime-secrets
              key: VLLM_API_TOKEN
        - name: VLLM_EMBEDDING_URL
          value: "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1"
        - name: VLLM_EMBEDDING_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: ai-runtime-secrets
              key: VLLM_EMBEDDING_API_TOKEN
        - name: INFERENCE_MODEL
          value: "llama-32-3b-instruct"
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
