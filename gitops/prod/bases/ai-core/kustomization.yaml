apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - datasciencecluster.yaml
  - hardware-profile.yaml
  - llamastack-distribution.yaml
  - rag-docs-seed-job.yaml
configMapGenerator:
  - name: rag-docs-seed-script
    namespace: dark-noc-rag
    files:
      - seed-product-docs.py
  - name: rag-docs-sources
    namespace: dark-noc-rag
    files:
      - documentation-sources.yaml
generatorOptions:
  disableNameSuffixHash: true
