---
- name: Restart nginx deployment on edge via Kubernetes API
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    namespace: "{{ namespace | default(edge_namespace | default('dark-noc-edge')) }}"
    deployment: "{{ deployment | default('nginx') }}"
    edge_cluster: "{{ edge_cluster | default('edge-01') }}"
    edge_api_url_from_env: "{{ lookup('env', 'K8S_AUTH_HOST') | default('', true) }}"
    edge_token_from_env: "{{ lookup('env', 'K8S_AUTH_API_KEY') | default('', true) }}"
    edge_verify_ssl_from_env: "{{ lookup('env', 'K8S_AUTH_VERIFY_SSL') | default('false', true) }}"

  tasks:
    - name: Resolve effective edge API auth values
      ansible.builtin.set_fact:
        edge_api_url_effective: "{{ edge_api_url | default(edge_api_url_from_env, true) }}"
        edge_token_effective: "{{ edge_token | default(edge_token_from_env, true) }}"
        edge_verify_ssl_effective: "{{ edge_verify_ssl | default(edge_verify_ssl_from_env, true) }}"
        edge_verify_ssl_bool: "{{ (edge_verify_ssl | default(edge_verify_ssl_from_env, true) | string | lower) in ['1', 'true', 'yes', 'on'] }}"

    - name: Ensure edge API auth is available
      ansible.builtin.assert:
        that:
          - edge_api_url_effective | length > 0
          - edge_token_effective | length > 20
        fail_msg: >-
          Missing edge API credentials. Attach Kubernetes bearer-token credential
          (edge-01-k8s) or pass edge_api_url and edge_token at launch.

    - name: Normalize edge API URL
      ansible.builtin.set_fact:
        edge_api_base: "{{ edge_api_url_effective.rstrip('/') }}"
        restart_ts: "{{ lookup('pipe', 'date -u +%FT%TZ') }}"

    - name: Read deployment before restart
      ansible.builtin.uri:
        url: "{{ edge_api_base }}/apis/apps/v1/namespaces/{{ namespace }}/deployments/{{ deployment }}"
        method: GET
        headers:
          Authorization: "Bearer {{ edge_token_effective }}"
        validate_certs: "{{ edge_verify_ssl_bool }}"
        return_content: true
        status_code: 200
      register: deploy_before

    - name: Capture desired replica target
      ansible.builtin.set_fact:
        desired_replicas: "{{ deploy_before.json.spec.replicas | default(1) | int }}"
        pre_generation: "{{ deploy_before.json.metadata.generation | default(0) | int }}"

    - name: Patch deployment with restart annotation
      ansible.builtin.uri:
        url: "{{ edge_api_base }}/apis/apps/v1/namespaces/{{ namespace }}/deployments/{{ deployment }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ edge_token_effective }}"
          Content-Type: "application/strategic-merge-patch+json"
        body_format: json
        body:
          spec:
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/restartedAt: "{{ restart_ts }}"
        validate_certs: "{{ edge_verify_ssl_bool }}"
        return_content: true
        status_code: 200
      register: deploy_patch

    - name: Wait for rollout to complete
      ansible.builtin.uri:
        url: "{{ edge_api_base }}/apis/apps/v1/namespaces/{{ namespace }}/deployments/{{ deployment }}"
        method: GET
        headers:
          Authorization: "Bearer {{ edge_token_effective }}"
        validate_certs: "{{ edge_verify_ssl_bool }}"
        return_content: true
        status_code: 200
      register: deploy_after
      retries: 30
      delay: 4
      until: >-
        (deploy_after.json.status.observedGeneration | default(0) | int) >=
        (deploy_patch.json.metadata.generation | default(pre_generation) | int)
        and
        (deploy_after.json.status.updatedReplicas | default(0) | int) >= desired_replicas
        and
        (deploy_after.json.status.readyReplicas | default(0) | int) >= desired_replicas
        and
        (deploy_after.json.status.availableReplicas | default(0) | int) >= desired_replicas

    - name: Report remediation result
      ansible.builtin.debug:
        msg: >-
          Restarted {{ namespace }}/{{ deployment }} on {{ edge_cluster }}.
          restart_ts={{ restart_ts }}
          generation={{ deploy_after.json.metadata.generation | default('n/a') }}
          ready={{ deploy_after.json.status.readyReplicas | default(0) }}/{{ desired_replicas }}
