---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dark-noc-dashboard
  namespace: dark-noc-ui
  labels:
    app: dark-noc-dashboard
    app.kubernetes.io/part-of: dark-noc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dark-noc-dashboard
  template:
    metadata:
      labels:
        app: dark-noc-dashboard
    spec:
      containers:
        - name: dashboard
          image: image-registry.openshift-image-registry.svc:5000/dark-noc-ui/dark-noc-dashboard:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dark-noc-dashboard
  namespace: dark-noc-ui
  labels:
    app: dark-noc-dashboard
spec:
  selector:
    app: dark-noc-dashboard
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dark-noc-dashboard
  namespace: dark-noc-ui
  labels:
    app: dark-noc-dashboard
spec:
  to:
    kind: Service
    name: dark-noc-dashboard
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
