---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dark-noc-chatbot
  namespace: dark-noc-ui
  labels:
    app: dark-noc-chatbot
    app.kubernetes.io/part-of: dark-noc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dark-noc-chatbot
  template:
    metadata:
      labels:
        app: dark-noc-chatbot
    spec:
      containers:
        - name: chatbot
          image: image-registry.openshift-image-registry.svc:5000/dark-noc-ui/dark-noc-chatbot:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVICENOW_URL
              value: "REPLACE_WITH_SERVICENOW_URL"
            - name: SERVICENOW_MODE
              value: "real"
            - name: SERVICENOW_USERNAME
              value: "REPLACE_WITH_SERVICENOW_USERNAME"
            - name: SERVICENOW_PASSWORD
              value: "REPLACE_WITH_SERVICENOW_PASSWORD"
            - name: SERVICENOW_API_KEY
              value: ""
            - name: SERVICENOW_UI_URL
              value: "REPLACE_WITH_SERVICENOW_INCIDENTS_URL"
            - name: SERVICENOW_UI_USERNAME
              value: "REPLACE_WITH_SERVICENOW_USERNAME"
            - name: SERVICENOW_UI_PASSWORD
              value: "REPLACE_WITH_SERVICENOW_PASSWORD"
            - name: SLACK_WORKSPACE_URL
              value: "REPLACE_WITH_SLACK_WORKSPACE_URL"
            - name: SLACK_UI_USERNAME
              value: ""
            - name: SLACK_UI_PASSWORD
              value: ""
            - name: OPENSHIFT_CONSOLE_URL
              value: "REPLACE_WITH_HUB_CONSOLE_URL"
            - name: OPENSHIFT_EDGE_CONSOLE_URL
              value: "REPLACE_WITH_EDGE_CONSOLE_URL"
            - name: OPENSHIFT_USERNAME
              value: "admin"
            - name: OPENSHIFT_PASSWORD
              value: "REPLACE_WITH_HUB_CONSOLE_PASSWORD"
            - name: OPENSHIFT_EDGE_USERNAME
              value: "admin"
            - name: OPENSHIFT_EDGE_PASSWORD
              value: "REPLACE_WITH_EDGE_CONSOLE_PASSWORD"
            - name: AAP_UI_URL
              value: "REPLACE_WITH_AAP_URL"
            - name: AAP_LIGHTSPEED_URL
              value: "REPLACE_WITH_AAP_LIGHTSPEED_URL"
            - name: AAP_UI_USERNAME
              value: "admin"
            - name: AAP_UI_PASSWORD
              value: "REPLACE_WITH_AAP_PASSWORD"
            - name: GRAFANA_URL
              value: "REPLACE_WITH_GRAFANA_URL"
            - name: GRAFANA_UI_USERNAME
              value: "admin"
            - name: GRAFANA_UI_PASSWORD
              value: "REPLACE_WITH_GRAFANA_PASSWORD"
            - name: LANGFUSE_URL
              value: "REPLACE_WITH_LANGFUSE_URL"
            - name: LANGFUSE_UI_USERNAME
              value: "admin"
            - name: LANGFUSE_UI_PASSWORD
              value: "REPLACE_WITH_LANGFUSE_PASSWORD"
            - name: KAFKA_UI_URL
              value: "REPLACE_WITH_KAFKA_UI_URL"
            - name: KAFKA_UI_USERNAME
              value: "admin"
            - name: KAFKA_UI_PASSWORD
              value: "REPLACE_WITH_KAFKA_UI_PASSWORD"
            - name: LOKI_UI_URL
              value: "REPLACE_WITH_LOKI_UI_URL"
            - name: AI_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: dark-noc-model-binding
                  key: MODEL_ID
                  optional: true
            - name: AGENT_FRAMEWORK
              value: "LangGraph + MCP + LlamaStack"
            - name: MODEL_API_URL
              valueFrom:
                configMapKeyRef:
                  name: dark-noc-model-binding
                  key: MODEL_API_URL
                  optional: true
            - name: MODEL_TIMEOUT_SECONDS
              value: "25"
            - name: MODEL_MAX_TOKENS
              value: "280"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dark-noc-chatbot
  namespace: dark-noc-ui
  labels:
    app: dark-noc-chatbot
spec:
  selector:
    app: dark-noc-chatbot
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dark-noc-chatbot
  namespace: dark-noc-ui
  labels:
    app: dark-noc-chatbot
spec:
  to:
    kind: Service
    name: dark-noc-chatbot
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
