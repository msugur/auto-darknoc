    app: langfuse
    app.kubernetes.io/part-of: dark-noc
spec:
  to:
    kind: Service
    name: langfuse-web
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
