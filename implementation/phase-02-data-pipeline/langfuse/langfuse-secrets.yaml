# =============================================================
# Langfuse Secrets — Template (FILL IN BEFORE APPLYING)
# =============================================================
# PURPOSE:
#   Centralizes secrets consumed by the Langfuse Helm chart when
#   using external PostgreSQL, Redis, ClickHouse, and MinIO.
#
# SECURITY NOTE:
#   This file is a TEMPLATE. Do NOT commit with real values.
#   The .gitignore excludes *-secrets.yaml from git tracking.
#   For production: use Sealed Secrets or HashiCorp Vault.
#
# GENERATING KEYS:
#   NEXTAUTH_SECRET: openssl rand -base64 32
#   SALT:           openssl rand -base64 32
#   ENCRYPTION_KEY: openssl rand -hex 32
#
# APPLY WITH:
#   oc apply -f langfuse-secrets.yaml -n dark-noc-observability
# =============================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: dark-noc-observability
  labels:
    app: langfuse
    app.kubernetes.io/part-of: dark-noc
type: Opaque
stringData:
  # External PostgreSQL app password (user: langfuse, db: langfuse)
  DATABASE_PASSWORD: "REPLACE_WITH_LANGFUSE_DB_PASSWORD"

  # External ClickHouse credentials
  CLICKHOUSE_PASSWORD: "REPLACE_WITH_CLICKHOUSE_PASSWORD"

  # External Redis password (set empty string if Redis auth is disabled)
  REDIS_PASSWORD: ""

  # Langfuse secrets (generate per environment)
  NEXTAUTH_SECRET: "REPLACE-WITH-openssl-rand-base64-32"
  SALT: "REPLACE-WITH-openssl-rand-base64-32"
  ENCRYPTION_KEY: "REPLACE-WITH-openssl-rand-hex-32"

  # MinIO access credentials for blob uploads
  S3_ACCESS_KEY_ID: "admin"
  S3_SECRET_ACCESS_KEY: "darknoc-minio-secret"
