apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: dark-noc-hub
  labels:
    app.kubernetes.io/part-of: dark-noc
    dark-noc/model-profile: granite-3.1-8b-lab-v1
spec:
  builtInAdapter:
    serverType: ovms
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.4
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - "--port=8080"
        - "--model=/mnt/models"
        - "--served-model-name=$(MODEL_NAME)"
        - "--dtype=half"
        - "--max-model-len=8192"
        - "--gpu-memory-utilization=0.95"
        - "--enable-auto-tool-choice"
        - "--tool-call-parser=granite"
        - "--guided-decoding-backend=xgrammar"
      env:
        - name: MODEL_NAME
          value: "granite-3.1-8b-lab-v1"
        - name: HF_HOME
          value: "/tmp/hf_home"
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          cpu: "4"
          memory: "12Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: "24Gi"
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 2Gi
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      version: "0.15.1"
      autoSelect: true
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-31-8b-lab-v1
  namespace: dark-noc-hub
  labels:
    app: granite-31-8b-lab-v1
    app.kubernetes.io/part-of: dark-noc
    dark-noc/layer: ai
    dark-noc/model-profile: granite-3.1-8b-lab-v1
  annotations:
    dark-noc/model-id: "granite-3.1-8b-lab-v1"
spec:
  predictor:
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      storageUri: "oci://quay.io/redhat-ai-services/modelcar-catalog:granite-3.1-8b-lab-v1"
    nodeSelector:
      dark-noc/gpu-worker: "true"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    minReplicas: 1
    maxReplicas: 1
