# =============================================================
# Hardware Profile — A10G GPU for Granite Inference
# =============================================================
# PURPOSE:
#   Hardware Profiles replaced Accelerator Profiles in RHOAI 3.3.
#   This profile defines the A10G GPU resource requirements for
#   the vLLM InferenceService running Granite 4.0 H-Tiny.
#
# RHOAI 3.3 CHANGE:
#   Old (2.x): AcceleratorProfile CRD
#   New (3.x): HardwareProfile CRD
#   If you have 2.x AcceleratorProfiles, they must be recreated
#   as HardwareProfiles after upgrading (no auto-migration).
#
# A10G SPECIFICATION:
#   GPU: NVIDIA A10G (on g5.2xlarge)
#   VRAM: 24 GB GDDR6
#   Compute: 250 TFLOPS FP16
#   Memory bandwidth: 600 GB/s
#   Granite H-Tiny INT8 footprint: ~8 GB
#   Available KV cache: ~16 GB (excellent for 128K context)
#
# APPLY WITH:
#   oc apply -f hardware-profile.yaml -n redhat-ods-applications
# =============================================================
---
apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: nvidia-a10g-gpu
  namespace: redhat-ods-applications
  labels:
    app.kubernetes.io/part-of: dark-noc
  annotations:
    opendatahub.io/display-name: "NVIDIA A10G GPU (g5.2xlarge)"
    opendatahub.io/description: "24GB VRAM A10G — Granite 4.0 H-Tiny inference"
spec:
  displayName: "NVIDIA A10G (24GB)"
  enabled: true
  identifiers:
    - displayName: "NVIDIA GPU"
      identifier: nvidia.com/gpu
      minCount: 1
      maxCount: 1
      defaultCount: 1
  nodeSelector:
    dark-noc/gpu-worker: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
