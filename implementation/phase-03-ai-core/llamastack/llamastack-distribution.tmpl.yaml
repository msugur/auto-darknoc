apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: dark-noc-llamastack
  namespace: dark-noc-hub
  labels:
    app.kubernetes.io/part-of: dark-noc
    dark-noc/layer: ai
    dark-noc/model-profile: __PROFILE_NAME__
  annotations:
    dark-noc/model-id: "__MODEL_ID__"
spec:
  replicas: 1
  network:
    exposeRoute: true
  server:
    workers: 1
    distribution:
      name: "__LLAMASTACK_DISTRIBUTION__"
    containerSpec:
      name: llamastack
      port: 8321
      env:
        - name: POSTGRES_HOST
          value: "langfuse-postgres-rw.dark-noc-observability.svc.cluster.local"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "postgres"
        - name: POSTGRES_USER
          value: "langfuse"
        - name: POSTGRES_PASSWORD
          value: "langfuse-pg-demo-2026"
        - name: VLLM_URL
          value: "http://__INFERENCE_SERVICE_NAME__-predictor.dark-noc-hub.svc.cluster.local:8080/v1"
        - name: VLLM_API_TOKEN
          value: "fake"
        - name: VLLM_EMBEDDING_URL
          value: "http://__INFERENCE_SERVICE_NAME__-predictor.dark-noc-hub.svc.cluster.local:8080/v1"
        - name: VLLM_EMBEDDING_API_TOKEN
          value: "fake"
        - name: INFERENCE_MODEL
          value: "__MODEL_ID__"
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
