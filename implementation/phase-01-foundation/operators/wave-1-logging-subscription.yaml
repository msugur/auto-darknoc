# =============================================================
# OpenShift Logging 6.4 — Operator Subscription (Hub)
# =============================================================
# PURPOSE:
#   Installs the Cluster Logging operator on the Hub cluster.
#   Hub logging collects cluster-level logs AND receives edge
#   logs forwarded via Kafka for long-term storage in LokiStack.
#
# OPENSHIFT LOGGING 6.4 CHANGES (vs 5.x):
#   - Fluentd COMPLETELY REMOVED — Vector 0.47 only
#   - LokiStack is now the REQUIRED log store (Elasticsearch removed)
#   - OTel semantic labels on all log records
#   - ClusterLogForwarder is the primary config object
#   - LogQL queries work via LokiStack MCP server
#
# WHY BOTH HUB AND EDGE NEED LOGGING:
#   Hub: ClusterLogging + LokiStack — stores logs, enables queries
#   Edge: ClusterLogForwarder ONLY — forwards nginx logs to Hub Kafka
#
# THE FULL LOG PATH:
#   Edge nginx pod → Edge Vector → Kafka (nginx-logs topic) →
#   Hub Kafka consumer → Hub LokiStack → LokiStack MCP server →
#   LangGraph agent queries → context for AI analysis
#
# NOTE: This subscription is for the HUB cluster only.
#   See edge-logging-subscription.yaml for Edge cluster install.
#
# APPLY WITH (on HUB cluster):
#   oc apply -f wave-1-logging-subscription.yaml
#
# VERIFY:
#   oc get csv -n openshift-logging | grep cluster-logging
#   # Wait for: cluster-logging.v6.4.x   Succeeded
# =============================================================
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: cluster-logging
  namespace: openshift-logging   # Pre-existing namespace on OpenShift
  labels:
    app.kubernetes.io/part-of: dark-noc
spec:
  channel: stable-6.4
  installPlanApproval: Automatic
  name: cluster-logging
  source: redhat-operators
  sourceNamespace: openshift-marketplace
---
# OperatorGroup for openshift-logging namespace
# NOTE: openshift-logging namespace exists on OCP but may not have OperatorGroup
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: cluster-logging-og
  namespace: openshift-logging
spec:
  targetNamespaces:
    - openshift-logging
